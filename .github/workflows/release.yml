name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build zip
        run: |
          VERSION="${GITHUB_REF_NAME}"
          STAGE="/tmp/build/SimpleRoll"
          mkdir -p "$STAGE"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitattributes' \
            --exclude='.pkgmeta' \
            --exclude='CLAUDE.md' \
            --exclude='doc' \
            --exclude='*.zip' \
            --exclude='*.disabled' \
            ./ "$STAGE/"
          cd /tmp/build
          zip -r "${GITHUB_WORKSPACE}/SimpleRoll-${VERSION}.zip" SimpleRoll

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "SimpleRoll-${GITHUB_REF_NAME}.zip" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
